[variables]
COMPOSER_ALLOW_SUPERUSER = "1"
APP_ENV = "production"

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --no-scripts"]

[phases.build]
cmds = [
    "composer dump-autoload --optimize"
]

[start]
cmd = "php artisan migrate --force --no-interaction && php artisan db:seed --force --no-interaction; php artisan config:clear; php artisan storage:link --force; php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
