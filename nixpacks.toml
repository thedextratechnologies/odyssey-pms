[variables]
COMPOSER_ALLOW_SUPERUSER = "1"

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --no-scripts"]

[phases.build]
cmds = [
    "composer dump-autoload --optimize"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force && php artisan config:clear && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"
